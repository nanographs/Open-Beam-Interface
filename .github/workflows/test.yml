name: Run Unit Tests
on: 
    push:
        paths:
          - 'software/*'
          - '.github/workflows/test.yml' # Trigger on changes to the workflow file
    pull_request:
        paths:
          - 'software/*'
          - '.github/workflows/test.yml' # Trigger on changes to the workflow file


defaults:
  run:
    working-directory: software

jobs:  
  build:  
    strategy:  
      matrix:  
        python-version: 
        - '3.13' 
        - '3.14' 
        os-version:
        - ubuntu-24.04
        - ubuntu-latest
        - macos-latest
        dep-versions:
        - minimal
        - latest
    runs-on: ${{ matrix.os-version }}
    name: 'test (${{ matrix.os-version }}, ${{ matrix.python-version }}, deps: ${{ matrix.dep-versions }})'

  
    steps:  
      - name: Check out source code
        uses: actions/checkout@v3  
      - name: Set up PDM
        uses: pdm-project/setup-pdm@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Generate lockfile
        if: matrix.dep-versions == 'minimal'
        run: pdm lock --group :all --python "==${{ matrix.python-version }}.*" --strategy direct_minimal_versions
      - name: Install dependencies
        run: pdm sync
        
